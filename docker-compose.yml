version: '3.8'

services:
  emareai:
    build: .
    container_name: emareai
    ports:
      - "8888:8888"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - API_HOST=0.0.0.0
      - API_PORT=8888
      - LOG_LEVEL=INFO
    volumes:
      - ./logs:/app/logs
      - ./.env:/app/.env
    restart: unless-stopped
    networks:
      - emare-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  emare-network:
    driver: bridge
